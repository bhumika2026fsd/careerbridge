<h1>Contact Us</h1>
<p>We'd love to hear from you. Send us your queries.</p>

<form class="contact-form" onsubmit="sendMessage(); return false;">

<label>Full Name</label><br>
<input type="text" placeholder="Enter your full name"><br><br>

<label>Email</label><br>
<input type="email" placeholder="Enter your email"><br><br>

<label>Phone Number</label><br>
<input type="tel" placeholder="Enter your phone number"><br><br>

<label>Subject</label><br>
<input type="text" placeholder="Enter subject"><br><br>

<label>Message</label><br>
<textarea rows="5" placeholder="Type your message"></textarea><br><br>

<button type="submit">Send Message</button>

</form>

<script src="js/script.js"></script>

</body>
